edition = "2023";

package contester.proto;

import "google/protobuf/go_features.proto";

option features.(pb.go).api_level = API_HYBRID;
option features.field_presence = IMPLICIT;
option features.enum_type = OPEN;
// `packed=false` needs to be transformed to field-level repeated_field_encoding
// features in Editions syntax
option features.json_format = ALLOW;
option features.utf8_validation = VERIFY;

import "Local.proto";

option java_package = "org.stingray.contester.proto";

option go_package = "github.com/contester/runlib/contester_proto";

message Compilation {
    enum Code {
	Unknown = 0;
        Success = 1;
        Failure = 2;
    }

    message Result {
        string step_name = 1;
        LocalExecution execution = 2;
        bool failure = 3;
    }

    bool failure = 1;
    repeated Result result_steps = 2;
};
